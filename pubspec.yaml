name: aim_desktop
description: "AIM 的桌面客户端 - 使用 Flutter 开发"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # 状态管理
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1

  # 网络请求
  dio: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
