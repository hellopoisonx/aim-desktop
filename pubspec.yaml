name: aim_desktop
description: "AIM 的桌面客户端 - 使用 Flutter 开发"
publish_to: 'none'

version: 1.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # 状态管理
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1

  # 网络请求
  dio: ^5.7.0
  file_selector: ^1.0.3
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  flutter_secure_storage: ^10.3.1
  protobuf: ^6.0.0
  web_socket_channel: ^3.0.3
  flutter_dotenv: ^6.0.1
  fixnum: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  drift_dev: ^2.33.0
  protoc_plugin: ^25.0.0

flutter:
  uses-material-design: true
